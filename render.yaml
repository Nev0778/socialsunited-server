services:
  - type: web
    name: socialsunited-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: socialsunited-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: socialsunited-db
    plan: free
    databaseName: socialsunited
    user: socialsunited
